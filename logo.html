<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Превью логотипа KeyboardCleaner</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e5e7eb;
            font-family: sans-serif;
        }
        .logo-container {
            width: 350px;
            height: 350px;
            filter: drop-shadow(0 20px 13px rgba(0, 0, 0, 0.03)) drop-shadow(0 8px 5px rgba(0, 0, 0, 0.08));
            transition: transform 0.3s ease;
        }
        .logo-container:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
          <defs>
            <!-- Основной градиент фона -->
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4F46E5" /> <!-- Индиго -->
              <stop offset="100%" stop-color="#06B6D4" /> <!-- Голубой -->
            </linearGradient>

            <!-- Градиент для следа от метлы (плавное растворение) -->
            <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
              <stop offset="40%" stop-color="#ffffff" stop-opacity="0.4" />
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" />
            </linearGradient>

            <!-- Тень для объема -->
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25" />
            </filter>
            
            <!-- Свечение для искр и следа -->
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>

            <!-- Шаблон искры -->
            <path id="sparkle" d="M 0 -20 Q 0 0 20 0 Q 0 0 0 20 Q 0 0 -20 0 Q 0 0 0 -20 Z" fill="#ffffff" filter="url(#glow)" />
          </defs>

          <!-- Базовая форма иконки -->
          <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" filter="url(#shadow)" />

          <!-- ================= КЛАВИАТУРА ================= -->
          <g id="keyboard">
            <!-- Корпус клавиатуры (создает отчетливый силуэт) -->
            <rect x="76" y="160" width="360" height="170" rx="24" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="6" />
            
            <!-- Клавиши -->
            <g fill="#ffffff" opacity="0.95">
              <!-- Верхний ряд -->
              <rect x="96" y="180" width="50" height="34" rx="8" />
              <rect x="160" y="180" width="50" height="34" rx="8" />
              <rect x="224" y="180" width="50" height="34" rx="8" />
              <rect x="288" y="180" width="50" height="34" rx="8" />
              <rect x="352" y="180" width="64" height="34" rx="8" /> <!-- Backspace -->

              <!-- Средний ряд -->
              <rect x="96" y="228" width="70" height="34" rx="8" /> <!-- Tab -->
              <rect x="180" y="228" width="50" height="34" rx="8" />
              <rect x="244" y="228" width="50" height="34" rx="8" />
              <rect x="308" y="228" width="108" height="34" rx="8" /> <!-- Enter -->

              <!-- Нижний ряд -->
              <rect x="96" y="276" width="90" height="34" rx="8" /> <!-- Shift -->
              <rect x="200" y="276" width="130" height="34" rx="8" /> <!-- Пробел -->
              <rect x="344" y="276" width="72" height="34" rx="8" /> <!-- Shift -->
            </g>
          </g>

          <!-- ================= АНИМАЦИЯ ЧИСТКИ ================= -->
          
          <!-- След от метлы -->
          <path d="M 110 270 Q 256 360 400 240"
                fill="none"
                stroke="url(#swooshGrad)"
                stroke-width="24"
                stroke-linecap="round"
                filter="url(#glow)"/>

          <!-- Метла / Щеточка -->
          <g transform="translate(400, 230) rotate(35)">
            <!-- Ручка -->
            <rect x="-14" y="-110" width="28" height="80" rx="14" fill="#FBBF24" />
            <rect x="-8" y="-105" width="8" height="70" rx="4" fill="#FCD34D" /> <!-- Блик на ручке -->
            
            <!-- Основание щетины -->
            <rect x="-26" y="-35" width="52" height="24" rx="10" fill="#E2E8F0" />
            
            <!-- Щетина -->
            <path d="M -24 -15 L 24 -15 L 34 45 C 20 55 -20 55 -34 45 Z" fill="#FFFFFF" />
            <!-- Текстура щетины (полоски) -->
            <path d="M -15 -10 L -22 40 M 0 -10 L 0 48 M 15 -10 L 22 40" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
          </g>

          <!-- ================= ДЕКОРАЦИИ ================= -->
          
          <!-- Пыль (справа, перед метлой) -->
          <g fill="#ffffff">
            <circle cx="430" cy="180" r="4" opacity="0.4" />
            <circle cx="450" cy="210" r="2.5" opacity="0.6" />
            <circle cx="440" cy="280" r="3" opacity="0.3" />
            <circle cx="400" cy="310" r="2" opacity="0.5" />
          </g>

          <!-- Искры чистоты (слева, позади метлы) -->
          <use href="#sparkle" x="120" y="130" transform="scale(0.8) translate(30, 30)" />
          <use href="#sparkle" x="240" y="110" transform="scale(0.6) translate(160, 70)" />
          <use href="#sparkle" x="150" y="340" transform="scale(1) translate(0, 0)" />

        </svg>
    </div>

</body>
</html>
